name: Security Audit

on:
  push:
    paths:
      - Cargo.toml
      - Cargo.lock
      - package.json
      - .github/workflows/security.yml
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - package.json
      - .github/workflows/security.yml
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  cargo-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit