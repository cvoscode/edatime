<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdaTime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/style.css?v=15">
</head>
<body>

<div class="app-layout">

  <!-- ==================== Sidebar ==================== -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">EdaTime</div>
    <button class="nav-item" type="button" data-page="upload" title="Upload">
      <span class="nav-icon">U</span>
      <span class="nav-text">Upload</span>
    </button>
    <button class="nav-item active" type="button" data-page="chart" title="Chart">
      <span class="nav-icon">C</span>
      <span class="nav-text">Chart</span>
    </button>

    <div class="sidebar-spacer"></div>
    <button class="nav-item nav-collapse" id="sidebar-collapse-btn" type="button" title="Collapse">
      <span class="nav-icon">≡</span>
      <span class="nav-text">Collapse</span>
    </button>
  </nav>

  <div class="app-content">

<!-- ==================== Header ==================== -->
<header>
  <div class="header-brand">
    <div class="brand-icon">
      <!-- timeseries waveform icon -->
      <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,9 4,5 7,11 10,3 13,8 15,6"/>
      </svg>
    </div>
    <span class="brand-name">EdaTime</span>
  </div>

  <div class="header-meta" id="header-meta">
    <div class="meta-stat" id="stat-rows"><span>Loading&hellip;</span></div>
  </div>
</header>

<!-- ==================== Pages ==================== -->

<!-- ===== Chart page ===== -->
<section class="page" id="page-chart" data-page-name="chart">
  <!-- ==================== Toolbar (Chart only) ==================== -->
  <div class="toolbar">
    <span class="toolbar-label">Series</span>
    <input type="text" id="column-filter-input" class="column-filter-input" placeholder="Filter columns…" aria-label="Filter columns">
    <div class="series-toggles" id="column-toggles"></div>
  </div>

  <main class="main">
    <div id="main-chart"></div>
  </main>
</section>

<!-- ===== Upload page ===== -->
<section class="page page-upload" id="page-upload" data-page-name="upload" hidden>
  <div id="upload-panel" class="open">
    <div class="upload-inner">

    <!-- Column 1: Drop zone -->
    <div class="drop-zone" id="drop-zone">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span class="dz-title">Drop CSV or Parquet here</span>
      <span class="dz-sub">or</span>
      <button class="btn btn-ghost" id="browse-btn" type="button">Browse file</button>
      <input type="file" id="file-upload" accept=".csv,.parquet" hidden>
      <span class="dz-filename" id="file-name-display"></span>
    </div>

    <!-- Column 2: Partial load options -->
    <div class="partial-section">
      <div class="partial-section-title">Load options</div>

      <label class="toggle-row" id="partial-toggle-row">
        <span class="switch">
          <input type="checkbox" id="partial-enabled">
          <span class="switch-slider"></span>
        </span>
        <span>
          <div class="toggle-label-text">Partial load</div>
          <div class="toggle-sub">Limit the rows ingested from the file</div>
        </span>
      </label>

      <div class="partial-fields" id="partial-fields">
        <div class="field-group">
          <label for="n-rows-input">Max rows to load</label>
          <div class="row">
            <input type="number" id="n-rows-input" placeholder="All rows" min="1" step="1000">
            <input type="range"  id="n-rows-range" min="1000" max="5000000" step="1000" value="1000000">
            <span class="range-value" id="n-rows-display">1 000 000</span>
          </div>
        </div>
        <div class="field-group">
          <label for="skip-rows-input">Skip first N rows</label>
          <div class="row">
            <input type="number" id="skip-rows-input" placeholder="0" min="0" value="0">
          </div>
        </div>
        <div class="field-group">
          <label>Time range (optional)</label>
          <div class="row">
            <input type="datetime-local" id="time-start-input" aria-label="Start time">
            <input type="datetime-local" id="time-end-input" aria-label="End time">
          </div>
        </div>
      </div>
    </div>

    <!-- Column 3: Actions -->
    <div class="upload-actions">
      <button class="btn btn-primary" id="upload-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 11V3M5 6l3-3 3 3"/>
          <path d="M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/>
        </svg>
        Upload &amp; Ingest
      </button>
      <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="upload-status" id="upload-status"></div>
    </div>
  </div>

  </div>
</section>

<!-- ==================== Column Filter Modal ==================== -->
<div id="column-filter-modal" class="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="column-filter-title">
    <div class="modal-header">
      <div class="modal-title" id="column-filter-title">Filter column</div>
      <button class="btn btn-ghost" id="column-filter-close-btn" type="button">Close</button>
    </div>

    <div class="modal-body">
      <label class="modal-field">
        <span class="modal-label">Column</span>
        <select id="column-filter-col" class="modal-select" aria-label="Select column"></select>
      </label>

      <div class="modal-grid">
        <label class="modal-field">
          <span class="modal-label">Min</span>
          <input id="column-filter-min" class="modal-input" type="number" step="any" aria-label="Minimum value">
        </label>
        <label class="modal-field">
          <span class="modal-label">Max</span>
          <input id="column-filter-max" class="modal-input" type="number" step="any" aria-label="Maximum value">
        </label>
      </div>

      <div class="modal-hint" id="column-filter-hint"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="column-filter-clear-btn" type="button">Clear</button>
      <div class="modal-actions-right">
        <button class="btn btn-ghost" id="column-filter-cancel-btn" type="button">Cancel</button>
        <button class="btn btn-primary" id="column-filter-apply-btn" type="button">Apply</button>
      </div>
    </div>
  </div>
</div>

  </div>
</div>

<script type="module" src="js/app.js?v=45"></script>
</body>
</html>
