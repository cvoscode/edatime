<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdaTime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/style.css?v=19">
</head>
<body>

<div class="app-layout">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">EdaTime</div>
    <button class="nav-item" type="button" data-page="upload" title="Upload">
      <span class="nav-icon">U</span>
      <span class="nav-text">Upload</span>
    </button>
    <button class="nav-item active" type="button" data-page="chart" title="Chart">
      <span class="nav-icon">C</span>
      <span class="nav-text">Chart</span>
    </button>

    <div class="sidebar-spacer"></div>
    <button class="nav-item nav-collapse" id="sidebar-collapse-btn" type="button" title="Collapse">
      <span class="nav-icon">≡</span>
      <span class="nav-text">Collapse</span>
    </button>
  </nav>

  <div class="app-content">

<header>
  <div class="header-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,9 4,5 7,11 10,3 13,8 15,6"/>
      </svg>
    </div>
    <span class="brand-name">EdaTime</span>
  </div>

  <div class="header-meta" id="header-meta">
    <div class="meta-stat" id="stat-rows"><span>Loading&hellip;</span></div>
  </div>
</header>

<section class="page" id="page-chart" data-page-name="chart">
  <div class="toolbar">
    <div class="toolbar-group" style="display:flex; align-items:center; gap:0.5rem;">
      <span class="toolbar-label">Series</span>
      <input type="text" id="column-filter-input" class="column-filter-input" placeholder="Filter columns…" aria-label="Filter columns">
      <div class="series-toggles" id="column-toggles"></div>
    </div>
    <div class="toolbar-group draw-toolbar" style="display:flex; align-items:center; gap:0.5rem; margin-left: auto;">
      <span class="toolbar-label">Draw</span>
      <select id="draw-tool" class="draw-select" style="padding: 0.2rem; background: var(--surface-2); color: var(--text-1); border: 1px solid var(--border);">
        <option value="none">None (Pan)</option>
        <option value="arrow">Arrow</option>
        <option value="box">Box</option>
      </select>
      <input type="color" id="draw-color" value="#ff0055" title="Color" style="cursor: pointer; padding: 0; width: 24px; height: 24px; background: none; border: none;">
      <input type="number" id="draw-width" value="2" min="1" max="10" title="Thickness" style="width: 40px; padding: 0.2rem; background: var(--surface-2); color: var(--text-1); border: 1px solid var(--border);">
      <button class="btn btn-ghost" id="draw-clear-btn" type="button" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;">Clear</button>
    </div>
    <div class="toolbar-group labels-toolbar" style="display:flex; align-items:center; gap:0.35rem; margin-left: 0.5rem; border-left: 1px solid var(--border); padding-left: 0.5rem;">
      <span class="toolbar-label">Labels</span>
      <input type="text" id="chart-title-input" placeholder="Title" aria-label="Chart title" style="width: 140px; padding: 0.2rem 0.35rem; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px;">
      <input type="text" id="x-axis-label-input" placeholder="X" aria-label="X axis label" style="width: 90px; padding: 0.2rem 0.35rem; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px;">
      <input type="text" id="y-axis-label-input" placeholder="Y" aria-label="Y axis label" style="width: 90px; padding: 0.2rem 0.35rem; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px;">
    </div>
    <div class="toolbar-group export-toolbar" style="display:flex; align-items:center; gap:0.25rem; margin-left: 0.5rem; border-left: 1px solid var(--border); padding-left: 0.5rem;">
      <span class="toolbar-label">Export</span>
      <button class="btn btn-ghost" id="export-png-btn" type="button" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;">PNG</button>
      <button class="btn btn-ghost" id="export-svg-btn" type="button" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;">SVG</button>
      <button class="btn btn-ghost" id="export-html-btn" type="button" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;">HTML</button>
    </div>
  </div>

  <main class="main">
    <div id="main-chart"></div>
  </main>
</section>

<section class="page page-upload" id="page-upload" data-page-name="upload" hidden>
  <div id="upload-panel" class="open">
    <div class="upload-inner">

      <div class="drop-zone" id="drop-zone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span class="dz-title">Drop CSV or Parquet here</span>
        <span class="dz-sub">or</span>
        <button class="btn btn-ghost" id="browse-btn" type="button">Browse file</button>
        <input type="file" id="file-upload" accept=".csv,.parquet" hidden>
        <span class="dz-filename" id="file-name-display"></span>
      </div>

      <div class="partial-section">
        <div class="partial-section-title">Load options</div>

        <label class="toggle-row" id="partial-toggle-row">
          <span class="switch">
            <input type="checkbox" id="partial-enabled">
            <span class="switch-slider"></span>
          </span>
          <span>
            <div class="toggle-label-text">Partial load</div>
            <div class="toggle-sub">Limit the rows ingested from the file</div>
          </span>
        </label>

        <div class="partial-fields" id="partial-fields">
          <div class="field-group">
            <label for="n-rows-input">Max rows to load</label>
            <div class="row">
              <input type="number" id="n-rows-input" placeholder="All rows" min="1" step="1000">
              <input type="range" id="n-rows-range" min="1000" max="5000000" step="1000" value="1000000">
              <span class="range-value" id="n-rows-display">1 000 000</span>
            </div>
          </div>
          <div class="field-group">
            <label for="skip-rows-input">Skip first N rows</label>
            <div class="row">
              <input type="number" id="skip-rows-input" placeholder="0" min="0" value="0">
            </div>
          </div>
          <div class="field-group">
            <label>Time range (optional)</label>
            <div class="row row-time">
              <input type="datetime-local" id="time-start-input" aria-label="Start time">
              <input type="datetime-local" id="time-end-input" aria-label="End time">
            </div>
            <div class="time-range-hint" id="time-range-hint">Detected range will appear after preview.</div>
          </div>
        </div>
      </div>

      <div class="upload-actions">
        <button class="btn btn-primary" id="upload-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 11V3M5 6l3-3 3 3"/>
            <path d="M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/>
          </svg>
          Upload &amp; Ingest
        </button>
        <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="upload-status" id="upload-status"></div>
      </div>
    </div>

    <div class="upload-preview">
      <div class="upload-preview-head">
        <span class="toolbar-label">File Preview</span>
        <input type="text" id="profile-filter-input" class="column-filter-input" placeholder="Filter columns…" aria-label="Filter profile columns">
        <span class="upload-preview-status" id="upload-preview-status">Select a file to preview columns</span>
      </div>

      <div class="profile-grid" id="profile-grid" role="table" aria-label="Column profile table">
        <div class="profile-grid-header" role="row">
          <div class="profile-col profile-col-name" role="columnheader">Column</div>
          <div class="profile-col profile-col-type" role="columnheader">Type</div>
          <div class="profile-col profile-col-count" role="columnheader">Non-null</div>
          <div class="profile-col profile-col-count" role="columnheader">Nulls</div>
          <div class="profile-col profile-col-num" role="columnheader">Min</div>
          <div class="profile-col profile-col-num" role="columnheader">Max</div>
          <div class="profile-col profile-col-hist" role="columnheader">Distribution</div>
        </div>

        <div class="profile-grid-viewport" id="profile-grid-viewport" role="rowgroup">
          <div class="profile-grid-spacer" id="profile-grid-spacer">
            <div class="profile-grid-rows" id="profile-grid-rows"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="column-filter-modal" class="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="column-filter-title">
    <div class="modal-header">
      <div class="modal-title" id="column-filter-title">Filter column</div>
      <button class="btn btn-ghost" id="column-filter-close-btn" type="button">Close</button>
    </div>

    <div class="modal-body">
      <label class="modal-field">
        <span class="modal-label">Column</span>
        <select id="column-filter-col" class="modal-select" aria-label="Select column"></select>
      </label>

      <div class="modal-grid">
        <label class="modal-field">
          <span class="modal-label">Min</span>
          <input id="column-filter-min" class="modal-input" type="number" step="any" aria-label="Minimum value">
        </label>
        <label class="modal-field">
          <span class="modal-label">Max</span>
          <input id="column-filter-max" class="modal-input" type="number" step="any" aria-label="Maximum value">
        </label>
      </div>

      <div class="modal-hint" id="column-filter-hint"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="column-filter-clear-btn" type="button">Clear</button>
      <div class="modal-actions-right">
        <button class="btn btn-ghost" id="column-filter-cancel-btn" type="button">Cancel</button>
        <button class="btn btn-primary" id="column-filter-apply-btn" type="button">Apply</button>
      </div>
    </div>
  </div>
</div>

  </div>
</div>

<script type="module" src="js/app.js?v=57"></script>
</body>
</html>
